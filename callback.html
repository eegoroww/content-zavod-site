<!DOCTYPE html>
<html>
<head>
    <title>Content Zavod - TikTok Auth</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0a0a0a; color: #fff; }
        .box { background: #1c1c1e; padding: 40px; border-radius: 16px; text-align: center; max-width: 500px; }
        .code { background: #333; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 20px 0; user-select: all; color: #FFD60A; }
        button { background: #FFD60A; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>TikTok Authorization</h2>
        <p>Copy this code and paste it in the app:</p>
        <div class="code" id="code"></div>
        <button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent)">Copy Code</button>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            document.getElementById('code').textContent = code;
        } else {
            document.getElementById('code').textContent = 'Error: ' + (params.get('error') || 'no code received');
        }
    </script>
</body>
</html>
